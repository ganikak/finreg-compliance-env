version: "3.9"

services:
  finreg-env-easy:
    build: .
    container_name: finreg_easy
    ports:
      - "7860:7860"
    environment:
      - FINREG_TASK=easy_structuring
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  finreg-env-medium:
    build: .
    container_name: finreg_medium
    ports:
      - "7861:7860"
    environment:
      - FINREG_TASK=medium_pep_sanctions
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  finreg-env-hard:
    build: .
    container_name: finreg_hard
    ports:
      - "7862:7860"
    environment:
      - FINREG_TASK=hard_crypto_layering
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 10s
      timeout: 5s
      retries: 5
